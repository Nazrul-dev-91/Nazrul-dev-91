name: Refresh Quotes Daily

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  update-quotes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 
      
       Silber-🚀: Get Local Random Quote
      - name: Get Random Quote
        id: get_quote
        run: |
          QUOTES=(
            "\"First, solve the problem. Then, write the code.\" — *John Johnson*"
            "\"Talk is cheap. Show me the code.\" — *Linus Torvalds*"
            "\"Clean code always looks like it was written by someone who cares.\" — *Michael Feathers*"
            "\"Software is a great combination between artistry and engineering.\" — *Bill Gates*"
            "\"Knowledge is power.\" — *Francis Bacon*"
            "\"Code is like humor. When you have to explain it, it’s bad.\" — *Cory House*"
            "\"Simplicity is the soul of efficiency.\" — *Austin Freeman*"
            "\"Make it work, make it right, make it fast.\" — *Kent Beck*"
          )
          
          RANDOM_QUOTE=${QUOTES[$RANDOM % ${#QUOTES[@]}]}
          echo "QUOTE_TEXT=$RANDOM_QUOTE" >> $GITHUB_ENV

      - name: Update README
        run: |
          sed -i '/<!-- README-QUOTES:START -->/,/<!-- README-QUOTES:END -->/{//!d;}' README.md
          sed -i '/<!-- README-QUOTES:START -->/a ${{ env.QUOTE_TEXT }}' README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "chore: update daily quote [skip ci]"
          git push
